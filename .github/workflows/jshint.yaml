name: Run JSHint 

on:
  push:
    branches:
      - main
      - master
      - develop
  pull_request:
    branches:
      - main
      - master
      - develop

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  analysis:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - run: cp install/package.json package.json

      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: NPM Install
        uses: bahmutov/npm-install@v1
        with:
          useLockFile: false

      - name: Run JShint
        run: |
          git fetch origin main
          FILES=$(git diff --name-only origin/main...HEAD | grep '\.js$' || true)

          if [ -z "$FILES" ]; then
            echo "No JS files changed"
          else
            echo "Running JSHint on:"
            echo "$FILES"
            ./node_modules/.bin/jshint $FILES || echo "JSHint found potential issues. You may want to review them"
          fi